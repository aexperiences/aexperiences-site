<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ESPO Music — your 5 minutes today</title>
<meta name="description" content="An interactive taste of ESPO Music — pick an instrument, warm up, then ride The Highway. It's never too late to play.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15100a; --bg2:#211810; --card:#1d160d; --line:#3a2c1c;
    --amber:#eaa83a; --amber2:#c8702a; --deep:#1a1207;
    --text:#f3e7d4; --muted:#a8927a; --glowrgb:234,168,58;
    --bgglow:#2a1d09; --demotop:#1a130b; --lane1:#241a0d; --lane2:#150e07; --lane3:#0d0804; --hot:#ffe6b0;
    --serif:'Fraunces',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:radial-gradient(130% 90% at 50% -10%, var(--bgglow), var(--bg) 60%);
    color:var(--text); font-family:var(--sans); display:flex; align-items:center; justify-content:center;
    padding:18px; min-height:100%;
  }
  .demo{
    width:100%; max-width:430px; background:linear-gradient(180deg, var(--demotop), var(--bg));
    border:1px solid var(--line); border-radius:26px; overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.55); position:relative; display:flex; flex-direction:column;
    min-height:600px;
  }
  .top{padding:18px 22px 6px; text-align:center;}
  .wm{font-family:var(--serif); font-weight:700; font-size:23px; letter-spacing:.2px;}
  .wm .a{color:var(--text);} .wm .b{color:var(--amber);}
  .tag{color:var(--muted); font-size:12.5px; letter-spacing:.4px; margin-top:1px; font-style:italic;}
  .rule{height:3px;width:46px;background:var(--amber);border-radius:2px;margin:12px auto 0;opacity:.85;}

  .screen{flex:1; padding:18px 22px 14px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; min-height:438px;}
  .kick{font-size:12px; font-weight:800; letter-spacing:.7px; text-transform:uppercase; color:var(--amber); opacity:.9;}
  .big{font-family:var(--serif); font-weight:700; font-size:30px; line-height:1.12; margin-top:6px;}
  .sub{color:var(--muted); font-size:15px; line-height:1.5; margin-top:12px; max-width:340px;}
  .pill{display:inline-flex; align-items:center; gap:8px; background:rgba(var(--glowrgb),.14); border:1px solid var(--line); color:var(--text); font-weight:600; font-size:13px; padding:7px 14px; border-radius:999px; margin-top:16px;}

  .cta-go{margin-top:24px; background:var(--amber); color:var(--deep); border:none; font-family:var(--sans); font-weight:800; font-size:16px; padding:15px 30px; border-radius:999px; cursor:pointer; box-shadow:0 10px 26px rgba(var(--glowrgb),.30); transition:transform .08s, filter .15s;}
  .cta-go:hover{filter:brightness(1.05);} .cta-go:active{transform:scale(.97);}

  .diagram{margin:2px auto;}
  .cname{font-family:var(--serif); font-weight:700; font-size:28px; margin-top:4px;}
  .cfull{color:var(--muted); font-size:13px; margin-top:-2px;}

  /* warm-up tappable cards */
  .ccards{display:flex; gap:10px; justify-content:center; margin:14px 0 2px;}
  .ccard{min-width:62px; padding:11px 8px; border-radius:14px; border:1px solid var(--line); background:var(--card); color:var(--text); font-family:var(--serif); font-weight:700; font-size:21px; cursor:pointer; transition:all .18s;}
  .ccard.on{background:var(--amber); color:var(--deep); border-color:var(--amber); transform:translateY(-3px); box-shadow:0 10px 24px rgba(var(--glowrgb),.34);}

  /* ===== THE HIGHWAY ===== */
  .hwy{position:relative; width:250px; height:300px; margin:4px auto 0; border-radius:18px; overflow:hidden;
       background:radial-gradient(120% 60% at 50% 100%, rgba(var(--glowrgb),.20), transparent 62%), linear-gradient(180deg,var(--lane1) 0%, var(--lane2) 56%, var(--lane3) 100%);
       border:1px solid #4a3920; box-shadow:inset 0 0 44px rgba(0,0,0,.62), 0 16px 44px rgba(0,0,0,.5);}
  .hwy .edge{position:absolute; top:0; bottom:0; width:2px; background:linear-gradient(180deg,transparent, rgba(var(--glowrgb),.55)); box-shadow:0 0 10px rgba(var(--glowrgb),.5);}
  .hwy .edge.l{left:40px; transform:skewX(9deg); transform-origin:bottom;}
  .hwy .edge.r{right:40px; transform:skewX(-9deg); transform-origin:bottom;}
  .hitline{position:absolute; left:10px; right:10px; bottom:48px; height:4px; border-radius:3px; background:var(--amber);
           box-shadow:0 0 16px 3px rgba(var(--glowrgb),.85), 0 0 42px 9px rgba(var(--glowrgb),.32); animation:hlpulse 1.1s ease-in-out infinite;}
  @keyframes hlpulse{0%,100%{opacity:.85;} 50%{opacity:1;}}
  .htile{position:absolute; left:50%; top:-110px; transform:translateX(-50%); padding:5px 6px 4px; border-radius:13px;
         background:linear-gradient(180deg,var(--hot),var(--amber));
         box-shadow:0 0 22px 2px rgba(var(--glowrgb),.55), inset 0 1px 0 rgba(255,255,255,.55); will-change:top;}
  .htile .tdia{background:#f4ece0; border-radius:7px; padding:3px 3px 2px;}
  .htile .tdia svg{display:block; margin:0 auto;}
  .htile .tn{font-family:var(--serif); font-weight:700; font-size:15px; line-height:1; color:#2a1c08; text-align:center; margin-top:2px;}
  .htile.pop{animation:tpop .2s ease;}
  @keyframes tpop{0%{transform:translateX(-50%) scale(1);} 42%{transform:translateX(-50%) scale(1.2); filter:brightness(1.6);} 100%{transform:translateX(-50%) scale(1);}}
  .burst{position:absolute; transform:translate(-50%,-50%) scale(.2); width:130px; height:130px; border-radius:50%; pointer-events:none;
         background:radial-gradient(circle, rgba(255,238,196,.95), rgba(var(--glowrgb),.5) 38%, transparent 70%); animation:burst .5s ease-out forwards;}
  @keyframes burst{to{transform:translate(-50%,-50%) scale(1.55); opacity:0;}}
  .spark{position:absolute; width:6px; height:6px; border-radius:50%; background:var(--hot); box-shadow:0 0 8px rgba(var(--glowrgb),.95); pointer-events:none;}
  .ember{position:absolute; bottom:-8px; width:4px; height:4px; border-radius:50%; background:rgba(var(--glowrgb),.7); box-shadow:0 0 6px rgba(var(--glowrgb),.7); pointer-events:none; animation:rise linear forwards;}
  @keyframes rise{to{transform:translateY(-310px); opacity:0;}}
  .combo{position:absolute; top:8px; left:0; right:0; text-align:center; font-family:var(--serif); font-weight:700; color:var(--hot); text-shadow:0 0 16px rgba(var(--glowrgb),.85); opacity:0; transition:opacity .2s, transform .12s;}
  .combo.show{opacity:1;} .combo .x{font-size:15px; opacity:.8;}
  .combo.bump{transform:scale(1.18);}
  .perfect{position:absolute; left:0; right:0; bottom:12px; text-align:center; font-weight:800; font-size:13.5px; letter-spacing:1px; color:#fff; text-shadow:0 0 12px rgba(var(--glowrgb),.9); opacity:0;}
  .perfect.show{animation:pf .62s ease;}
  @keyframes pf{0%{opacity:0; transform:translateY(8px);} 30%{opacity:1; transform:none;} 100%{opacity:0;}}
  .countin{position:absolute; left:0; right:0; top:40%; text-align:center; font-family:var(--serif); font-weight:700; font-size:62px; color:var(--hot); text-shadow:0 0 26px rgba(var(--glowrgb),.85); pointer-events:none;}
  .countin.go{font-size:46px;}
  .songname{font-family:var(--serif); font-weight:700; font-size:20px; margin-top:12px;}
  .songsub{color:var(--muted); font-size:13px; margin-top:2px; letter-spacing:1.5px;}
  .help{display:inline-block; margin-top:12px; background:rgba(var(--glowrgb),.12); border:1px solid var(--line); color:var(--text); font-size:12.5px; font-weight:600; padding:6px 13px; border-radius:999px;}
  .coach{margin:10px auto 0; display:flex; gap:8px; align-items:flex-start; max-width:320px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:8px 12px; text-align:left;}
  .coach b{color:var(--amber); font-family:var(--sans); font-weight:800; font-size:12.5px; flex:0 0 auto;}
  .coach span{color:var(--text); font-size:12.5px; line-height:1.34;}

  .bar{border-top:1px solid var(--line); background:var(--card); padding:13px 16px calc(13px + env(safe-area-inset-bottom)); display:flex; align-items:center; gap:12px; min-height:64px;}
  .bar.hide{display:none;}
  .info{flex:1; min-width:0; text-align:left;}
  .dots{display:flex; gap:5px; margin-bottom:6px;}
  .dots i{width:30px; height:4px; border-radius:2px; background:var(--line); transition:background .25s;}
  .dots i.on{background:var(--amber);}
  .step{font-size:13.5px; font-weight:700; color:var(--text);}
  .ssub{font-size:12.5px; color:var(--muted); margin-top:1px; line-height:1.3;}
  .next{flex:0 0 auto; background:var(--amber); color:var(--deep); border:none; font-family:var(--sans); font-weight:800; font-size:15px; padding:11px 22px; border-radius:999px; cursor:pointer;}
  .next:active{transform:scale(.97);}

  .fin .emoji{font-size:46px;}
  .credit{margin-top:8px; color:var(--muted); font-size:12px;}
  .badge-live{display:inline-flex;align-items:center;gap:7px;background:rgba(15,138,95,.16);border:1px solid rgba(15,138,95,.5);color:#5fd0a6;font-weight:700;font-size:12px;letter-spacing:.5px;text-transform:uppercase;padding:5px 12px;border-radius:999px;}
  .badge-live .d{width:7px;height:7px;border-radius:50%;background:#36c98e;box-shadow:0 0 8px #36c98e;}
  .streak{display:inline-flex;align-items:center;gap:7px;margin-top:14px;background:rgba(var(--glowrgb),.12);border:1px solid var(--line);color:var(--text);font-weight:700;font-size:13px;padding:7px 14px;border-radius:999px;}

  .conf{position:absolute;top:-16px;width:9px;height:14px;border-radius:2px;pointer-events:none;z-index:50;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(640px) rotate(540deg);opacity:.2;}}
  .fade{animation:fadein .35s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  @media (max-width:380px){ .big{font-size:26px;} .demo{min-height:560px;} }
.illu{height:108px;margin:0 auto 2px;display:flex;justify-content:center;}
  .illu svg{height:100%;width:auto;display:block;filter:drop-shadow(0 0 13px rgba(var(--glowrgb),.45));}
  /* ===== v2026 cinematic + polish ===== */
  .illu{animation:illuIn .85s cubic-bezier(.2,.7,.2,1) both;}
  .illu svg{animation:illuFloat 4.6s ease-in-out infinite, illuGlow 3.4s ease-in-out infinite;}
  @keyframes illuIn{from{opacity:0; transform:translateY(12px) scale(.9);} to{opacity:1; transform:none;}}
  @keyframes illuFloat{0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);}}
  @keyframes illuGlow{0%,100%{filter:drop-shadow(0 0 10px rgba(var(--glowrgb),.35));} 50%{filter:drop-shadow(0 0 20px rgba(var(--glowrgb),.62));}}
  @keyframes fadein{from{opacity:0; transform:translateY(10px) scale(.992);} to{opacity:1; transform:none;}}
  .fade{animation:fadein .42s cubic-bezier(.2,.7,.2,1);}
  .next{transition:transform .08s, filter .15s, box-shadow .18s;}
  .next:hover{filter:brightness(1.06); box-shadow:0 8px 20px rgba(var(--glowrgb),.32);}
  .next:active{transform:scale(.96);}
  .ccard:hover{border-color:var(--amber); transform:translateY(-2px);}
  .ccard:active{transform:scale(.95);}
  .cta-go{transition:transform .1s cubic-bezier(.2,.7,.2,1), filter .15s, box-shadow .2s;}
  .cta-go:hover{box-shadow:0 14px 34px rgba(var(--glowrgb),.42); transform:translateY(-1px);}
  .big{letter-spacing:-.3px;}
  .hwy::before{content:""; position:absolute; left:50%; top:-6%; width:74%; height:58%; transform:translateX(-50%); background:radial-gradient(55% 70% at 50% 0%, rgba(var(--glowrgb),.18), transparent 72%); pointer-events:none; z-index:0;}
  .hwy::after{content:""; position:absolute; inset:0; pointer-events:none; border-radius:18px; background:radial-gradient(120% 80% at 50% 30%, transparent 58%, rgba(0,0,0,.42)); z-index:1;}
  .hwy.shake{animation:hwyshake .26s ease;}
  @keyframes hwyshake{0%,100%{transform:translate(0,0);} 20%{transform:translate(-2px,1px);} 50%{transform:translate(2px,-1px);} 80%{transform:translate(-1px,1px);}}
  .htile{z-index:2;} .htile .tdia{box-shadow:0 4px 14px rgba(0,0,0,.4);}
  .hitline{z-index:2;} .combo{top:22px; z-index:5;} .perfect{z-index:5;} .countin{z-index:6;}
  .smeter{position:absolute; left:16px; right:16px; top:11px; height:6px; border-radius:4px; background:rgba(0,0,0,.4); overflow:hidden; z-index:5; box-shadow:inset 0 0 0 1px rgba(var(--glowrgb),.18);}
  .smeter i{display:block; height:100%; width:0; border-radius:4px; background:linear-gradient(90deg,var(--amber2),var(--amber),var(--hot)); box-shadow:0 0 10px rgba(var(--glowrgb),.75); transition:width .28s cubic-bezier(.2,.7,.2,1);}
  .flash{position:absolute; transform:translate(-50%,-50%); width:96px; height:96px; border-radius:50%; pointer-events:none; z-index:4; background:radial-gradient(circle, rgba(255,255,255,.95), rgba(var(--glowrgb),.45) 42%, transparent 72%); animation:flashout .34s ease-out forwards;}
  @keyframes flashout{to{opacity:0; transform:translate(-50%,-50%) scale(1.5);}}
  .ring{position:absolute; transform:translate(-50%,-50%) scale(.25); width:120px; height:120px; border-radius:50%; border:2px solid rgba(var(--glowrgb),.85); pointer-events:none; z-index:4; animation:ringout .6s cubic-bezier(.2,.7,.2,1) forwards;}
  @keyframes ringout{to{transform:translate(-50%,-50%) scale(1.8); opacity:0;}}
  .hitline.hit{animation:hlflash .42s ease;}
  @keyframes hlflash{0%{filter:brightness(2.4);} 100%{filter:brightness(1);}}
  </style>
</head>
<body>
<div class="demo" id="demo">
  <div class="top">
    <div class="wm"><span class="a">ESPO</span><span class="b">Music</span></div>
    <div class="tag" id="tag">It's never too late to play.</div>
    <div class="rule"></div>
  </div>
  <div class="screen" id="scr"></div>
  <div class="bar hide" id="bar">
    <div class="info">
      <div class="dots"><i></i><i></i></div>
      <div class="step" id="bStep">Step 1 of 2</div>
      <div class="ssub" id="bSub"></div>
    </div>
    <button class="next" id="bNext">Next</button>
  </div>
</div>

<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var scr=$('scr'), bar=$('bar'), bStep=$('bStep'), bSub=$('bSub'), bNext=$('bNext');
  var ESPO='https://espomusic.com';

  /* ---------- which instrument? ---------- */
  var INST=(new URLSearchParams(location.search).get('inst')||'fret').toLowerCase();
  var _QP=new URLSearchParams(location.search), APP=(_QP.get('app')||'').replace(/[^a-z]/gi,''), EMBED=_QP.get('embed')==='1';
  if(EMBED){ try{ document.documentElement.style.background='transparent'; document.body.style.background='transparent'; document.body.style.padding='2px'; }catch(e){} }
  var CFG={
    fret:  {label:'Fret', sub:'guitar', kind:'guitar', warm:['Em','Am','C'], hwy:['G','C','D','Em','G','C','D','G'], song:'Campfire classic', songsub:'G · C · D · Em'},
    uke:   {label:'The Uke', sub:'ukulele', kind:'uke', warm:['C','Am','F'], hwy:['C','G','Am','F','C','G','F','C'], song:'Island strum', songsub:'C · G · Am · F'},
    grand: {label:'Grand', sub:'piano', kind:'piano', warm:['C','G','Am'], hwy:['C','G','Am','F','C','G','F','C'], song:'Parlor tune', songsub:'C · G · Am · F'},
    harp:  {label:'Harp', sub:'harmonica', kind:'harp', warm:['4','5','6'], hwy:['4','5','6','5','4','5','6','4'], song:'Blues riff', songsub:'holes 4 · 5 · 6'}
  };
  var C=CFG[INST]||CFG.fret;
  $('tag').textContent=C.label+' · '+C.sub;

  /* ---------- per-instrument color scheme (matches the real apps) ---------- */
  var THEMES={
    fret:  {bg:'#15100a',bg2:'#211810',card:'#1d160d',line:'#3a2c1c',amber:'#eaa83a',amber2:'#c8702a',deep:'#1a1207',text:'#f3e7d4',muted:'#a8927a',glowrgb:'234,168,58',bgglow:'#2a1d09',demotop:'#1a130b',lane1:'#241a0d',lane2:'#150e07',lane3:'#0d0804',hot:'#ffe6b0'},
    grand: {bg:'#0c0c0f',bg2:'#15151b',card:'#191920',line:'#2d2d38',amber:'#d4a64a',amber2:'#a87d31',deep:'#08080b',text:'#f4f1ea',muted:'#a3a2ad',glowrgb:'212,166,74',bgglow:'#1c160b',demotop:'#15151b',lane1:'#20202a',lane2:'#15151b',lane3:'#0a0a0e',hot:'#f3eee2'},
    harp:  {bg:'#0e1420',bg2:'#161e2e',card:'#18212f',line:'#2a3850',amber:'#8fb3d9',amber2:'#5f86b0',deep:'#090d16',text:'#eef2f8',muted:'#9aa8be',glowrgb:'143,179,217',bgglow:'#16263f',demotop:'#161e2e',lane1:'#16263f',lane2:'#0f1a2c',lane3:'#080d16',hot:'#dbeeff'},
    uke:   {bg:'#0a1613',bg2:'#102420',card:'#122a23',line:'#1f3d35',amber:'#54c7a4',amber2:'#2f9e80',deep:'#06100d',text:'#eaf5f0',muted:'#9fc0b5',glowrgb:'84,199,164',bgglow:'#103a2e',demotop:'#102420',lane1:'#123d31',lane2:'#0c2a22',lane3:'#061310',hot:'#c9f5e6'}
  };
  (function(){ var th=THEMES[CFG[INST]?INST:'fret']||THEMES.fret, rs=document.documentElement.style; for(var k in th){ rs.setProperty('--'+k, th[k]); } rs.setProperty('--accent',th.amber); rs.setProperty('--accent2',th.amber2); })();
  var HELP={guitar:'where to put your fingers',uke:'where to put your fingers',piano:'which keys to press',harp:'which hole to play'};
  var COACH={
    guitar:['Press just behind the fret so every string rings.','Anchor one finger and pivot to the next chord.',"You're landing right on the beat \u2014 lovely."],
    uke:['Light touch \u2014 let all four strings sing.','Keep your strumming hand loose and even.','Right on time \u2014 keep that groove going.'],
    piano:['Curve your fingers, press from the knuckle.',"Find the shape, then trust it \u2014 you've got this.",'Nice steady tempo \u2014 that is the secret.'],
    harp:['Pucker small and aim for the one hole.','Breathe from your belly, not your throat.','Smooth and steady \u2014 feel the groove.']
  };

  /* ---------- chord data ---------- */
  var GSHAPES={Em:'022000',Am:'x02210',C:'x32010',G:'320003',D:'xx0232'};
  var GFULL={Em:'E minor',Am:'A minor',C:'C major',G:'G major',D:'D major'};
  var GFREQ={Em:[82.41,123.47,164.81,196.00,246.94,329.63],Am:[null,110.00,164.81,220.00,261.63,329.63],G:[98.00,123.47,146.83,196.00,246.94,392.00],C:[null,130.81,164.81,196.00,261.63,329.63],D:[null,null,146.83,220.00,293.66,369.99]};
  var USHAPES={C:'0003',Am:'2000',F:'2010',G:'0232'};
  var UFULL={C:'C major',Am:'A minor',F:'F major',G:'G major'};
  var UFREQ={C:[392,261.63,329.63,523.25],Am:[440,261.63,329.63,440],F:[440,261.63,349.23,440],G:[392,293.66,392,493.88]};
  var PFULL={C:'C major',G:'G major',Am:'A minor',F:'F major'};
  var PFREQ={C:[261.63,329.63,392.00],G:[196,246.94,293.66],Am:[220,261.63,329.63],F:[174.61,220,261.63]};
  var PKEYS={C:[0,2,4],G:[4,6,8],Am:[5,7,9],F:[3,5,7]}; // white-key indices on a 10-key strip C..E'
  var HHOLE={'4':{n:4,f:523.25},'5':{n:5,f:659.25},'6':{n:6,f:783.99}};

  /* ---------- diagrams ---------- */
  function fretDia(name, shapes, strings){
    var p=shapes[name]||'', W=strings===4?96:128, H=146, L=20, R=W-20, T=32, B=H-20, n=strings-1;
    var sx=(R-L)/n, fy=(B-T)/4, svg='';
    svg+='<svg class="diagram" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">';
    svg+='<rect x="'+L+'" y="'+T+'" width="'+(R-L)+'" height="'+(B-T)+'" rx="3" fill="none" stroke="#5a4427" stroke-width="1.5"/>';
    svg+='<rect x="'+(L-1)+'" y="'+(T-4)+'" width="'+(R-L+2)+'" height="4" fill="#9c7a44"/>';
    for(var f=1;f<4;f++){var y=T+fy*f;svg+='<line x1="'+L+'" y1="'+y+'" x2="'+R+'" y2="'+y+'" stroke="#3a2c1c" stroke-width="1"/>';}
    for(var s=0;s<strings;s++){var x=L+sx*s;svg+='<line x1="'+x+'" y1="'+T+'" x2="'+x+'" y2="'+B+'" stroke="#5a4427" stroke-width="1"/>';}
    for(var s2=0;s2<strings;s2++){

  var AC=null;
  function ksPluck(freq, t, gain, voice){
    var sr=AC.sampleRate, N=Math.max(2,Math.round(sr/freq));

    var ring=new Float32Array(N), lp0=0;
    for(var i=0;i<N;i++){ lp0=((Math.random()*2-1)+lp0)*0.5; ring[i]=lp0; }
    var pos=0, decay=voice==='uke'?0.9945:0.9961;
    for(var s=0;s<len;s++){ var cur=ring[pos]; d[s]=cur; ring[pos]=(cur+ring[(pos+1)%N])*0.5*decay; pos=(pos+1)%N; }

    var rel=(sr*0.15)|0; for(var r=0;r<rel;r++){ d[len-1-r]*=r/rel; }

    var g=AC.createGain(); g.gain.value=gain;

    var wrap=$('wCards');
    C.warm.forEach(function(c){
      var b=document.createElement('button'); b.className='ccard'+(c===sel?' on':''); b.textContent=c;
      b.onclick=function(){
        $('wDia').innerHTML=diagram(c); $('wName').textContent=bigName(c); $('wFull').textContent=fullName(c);
        wrap.querySelectorAll('.ccard').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); play(c);
      };
      wrap.appendChild(b);
    });
  }

  function renderHighway(){
    clearHwy(); scr.className='screen fade';
    scr.innerHTML=
      '<div class="kick">The Highway</div>'+
      '<div class="hwy" id="hwy"><div class="edge l"></div><div class="edge r"></div><div class="smeter"><i id="smfill"></i></div>'+
        '<div class="hitline"></div><div class="combo" id="combo"></div>'+
        '<div class="perfect" id="pf">Perfect!</div><div class="countin" id="ci">3</div></div>'+
      '<div class="songname">'+C.song+'</div><div class="songsub">'+C.songsub+'</div>'+
      '<div class="sub" style="margin-top:8px;">Each '+(C.kind==='harp'?'hole':'chord')+' shows the shape as it lands — play it on <b>your real '+C.sub+'</b>.</div>'+
      '<div class="coach"><b>Brian</b><span id="coachT">Watch the shape, then play it as it lands — I\'ll keep you on time.</span></div>';
    var hwy=$('hwy'), comboEl=$('combo'), pf=$('pf'), ci=$('ci'); window._coachT=document.getElementById('coachT'); window._smeter=document.getElementById('smfill');
    try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)(); if(AC.state!=='running'&&AC.resume){AC.resume();} }catch(e){}
    var prog=C.hwy, k=0, combo=0, HITY=198, BURST_Y=236;
    var cn=['3','2','1','GO'], ciIdx=0; ci.textContent=cn[0]; try{bHat(AC.currentTime+0.03);}catch(e){}
    var ciT=setInterval(function(){
      ciIdx++;
      if(ciIdx>=cn.length){ clearInterval(ciT); ci.style.display='none'; startFall(); }
      else { ci.textContent=cn[ciIdx]; ci.classList.toggle('go', cn[ciIdx]==='GO'); ci.style.animation='none'; void ci.offsetWidth; ci.style.animation='pf .5s ease'; try{ if(cn[ciIdx]==='GO') bKick(AC.currentTime+0.02); else bHat(AC.currentTime+0.02); }catch(e){} }
    },560);
    window._hwyTimers.push(ciT);
    var embT=setInterval(function(){
      if(!document.body.contains(hwy)){ clearInterval(embT); return; }
      var e=document.createElement('div'); e.className='ember'; e.style.left=(12+Math.random()*76)+'%';
      e.style.animationDuration=(2.2+Math.random()*1.6)+'s'; hwy.appendChild(e); setTimeout(function(){e.remove();},4200);
    },340);
    window._hwyTimers.push(embT);

    function onHit(tile,name){
      play(name); tile.style.transform='translateX(-50%) scale(1)'; tile.classList.add('pop'); combo++;
      comboEl.innerHTML=combo+'<span class="x">×</span>'; comboEl.classList.add('show'); comboEl.classList.add('bump');
      comboEl.style.fontSize=(24+Math.min(combo,10))+'px'; setTimeout(function(){comboEl.classList.remove('bump');},130);
      pf.textContent = combo>=6 ? ('PERFECT ×'+combo) : 'Perfect!';
      pf.classList.remove('show'); void pf.offsetWidth; pf.classList.add('show');
      if(window._coachT){ var _cl=COACH[C.kind]||COACH.guitar; window._coachT.textContent=CHEER[combo]||_cl[(combo-1)%_cl.length]; }
      if(window._smeter){ window._smeter.style.width=Math.min(100,combo*11)+'%'; }
      var hl=hwy.querySelector('.hitline'); if(hl){ hl.classList.remove('hit'); void hl.offsetWidth; hl.classList.add('hit'); }
      if(combo%4===0){ hwy.classList.remove('shake'); void hwy.offsetWidth; hwy.classList.add('shake'); }
      var bx=hwy.clientWidth/2;
      var fl=document.createElement('div'); fl.className='flash'; fl.style.left=bx+'px'; fl.style.top=BURST_Y+'px'; hwy.appendChild(fl); setTimeout(function(){fl.remove();},340);
      var rg=document.createElement('div'); rg.className='ring'; rg.style.left=bx+'px'; rg.style.top=BURST_Y+'px'; hwy.appendChild(rg); setTimeout(function(){rg.remove();},600);
      var b=document.createElement('div'); b.className='burst'; b.style.left=bx+'px'; b.style.top=BURST_Y+'px'; hwy.appendChild(b); setTimeout(function(){b.remove();},520);
      for(var i=0;i<14;i++){(function(i){
        var s=document.createElement('div'); s.className='spark'; s.style.left=bx+'px'; s.style.top=BURST_Y+'px';
        var sz=4+Math.random()*4; s.style.width=sz+'px'; s.style.height=sz+'px'; hwy.appendChild(s);
        var ang=Math.PI*2*i/14+Math.random()*0.3, dist=34+Math.random()*40, sx=Math.cos(ang)*dist, sy=Math.sin(ang)*dist;
        s.animate([{transform:'translate(-50%,-50%)',opacity:1},{transform:'translate(calc(-50% + '+sx+'px), calc(-50% + '+sy+'px))',opacity:0}],{duration:520,easing:'cubic-bezier(.2,.7,.2,1)'});
        setTimeout(function(){s.remove();},540);
      })(i);}
      setTimeout(function(){ tile.style.transition='opacity .22s, top .22s linear'; tile.style.opacity='0'; tile.style.top=(HITY+30)+'px'; setTimeout(function(){tile.remove();},240); },110);
    }
    function spawnTile(){
      if(!document.body.contains(hwy)){ return; }
      var name=prog[k%prog.length]; k++;
      var tile=document.createElement('div'); tile.className='htile'; tile.innerHTML='<div class="tdia">'+miniDia(name)+'</div><div class="tn">'+name+'</div>'; hwy.appendChild(tile);
      var start=performance.now(), dur=1520, fromY=-120, hit=false;
      function frame(now){
        if(!document.body.contains(hwy)){ return; }
        var p=Math.min(1,(now-start)/dur);
        var pe=p*p;                                  // gravity: accelerate
        var y=fromY+(HITY-fromY)*pe;
        var sc=0.56+0.44*p;                          // depth: far small -> near big
        var st=1+(1-p)*0.14;                         // motion smear, eases to 1
        tile.style.top=y+'px';
        tile.style.transform='translateX(-50%) scale('+sc.toFixed(3)+') scaleY('+st.toFixed(3)+')';
        tile.style.opacity=(p<0.14?(p/0.14).toFixed(2):1);
        if(!hit && p>=1){ hit=true; onHit(tile,name); return; }
        if(p<1) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }
    function startFall(){ var STEP=760; spawnTile(); var ft=setInterval(spawnTile, STEP); window._hwyTimers.push(ft);
      var beat=function(){ if(!document.body.contains(hwy)) return; try{ var t=AC.currentTime+0.02; bKick(t); bHat(t+STEP/2000); }catch(e){} };
      beat(); var bt=setInterval(beat, STEP); window._hwyTimers.push(bt);
    }
  }

  function finish(){
    clearHwy(); bar.classList.add('hide'); scr.className='screen fade fin';
    scr.innerHTML=
      '<div class="emoji">🔥</div>'+
      '<div class="big" style="margin-top:8px;">Nice run!</div>'+
      '<div class="sub">That\'s The Highway inside ESPO Music — '+C.label+' is one of four: guitar, piano, harmonica &amp; ukulele. Five minutes a day, a streak that keeps you coming back, and real songs waiting.</div>'+
      '<div class="streak">🔥 Day 1 streak started</div>'+
      '<a class="cta-go" href="'+(APP?('/'+APP):ESPO)+'" target="'+(APP?'_top':'_blank')+'" rel="noopener" style="text-decoration:none;display:inline-block;">'+(APP?('Open ESPO '+C.label+' →'):'Play free at espomusic.com →')+'</a>'+
      '<button class="cta-go" id="again" style="background:transparent;color:var(--amber);border:1px solid var(--amber);box-shadow:none;margin-top:12px;">↻ Run it again</button>';
    confetti(); play(C.hwy[0]);
    $('again').onclick=intro;
  }

  bNext.onclick=function(){ if(idx>=steps.length-1){ finish(); return; } idx++; go(); };

  intro();
})();
</script>
</body>
</html>
