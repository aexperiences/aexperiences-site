<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ESPO Music — your 5 minutes today</title>
<meta name="description" content="An interactive taste of ESPO Music — warm up your chords, then ride The Highway. It's never too late to play.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15100a; --bg2:#211810; --card:#1d160d; --line:#3a2c1c;
    --amber:#eaa83a; --amber2:#c8702a; --deep:#1a1207;
    --text:#f3e7d4; --muted:#a8927a; --glowrgb:234,168,58;
    --serif:'Fraunces',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:radial-gradient(130% 90% at 50% -10%, #2a1d09, var(--bg) 60%);
    color:var(--text); font-family:var(--sans); display:flex; align-items:center; justify-content:center;
    padding:18px; min-height:100%;
  }
  .demo{
    width:100%; max-width:430px; background:linear-gradient(180deg, #1a130b, var(--bg));
    border:1px solid var(--line); border-radius:26px; overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.55); position:relative; display:flex; flex-direction:column;
    min-height:600px;
  }
  .top{padding:18px 22px 6px; text-align:center;}
  .wm{font-family:var(--serif); font-weight:700; font-size:23px; letter-spacing:.2px;}
  .wm .a{color:var(--text);} .wm .b{color:var(--amber);}
  .tag{color:var(--muted); font-size:12.5px; letter-spacing:.4px; margin-top:1px; font-style:italic;}
  .rule{height:3px;width:46px;background:var(--amber);border-radius:2px;margin:12px auto 0;opacity:.85;}

  .screen{flex:1; padding:18px 22px 14px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; min-height:438px;}
  .kick{font-size:12px; font-weight:800; letter-spacing:.7px; text-transform:uppercase; color:var(--amber); opacity:.9;}
  .big{font-family:var(--serif); font-weight:700; font-size:30px; line-height:1.12; margin-top:6px;}
  .sub{color:var(--muted); font-size:15px; line-height:1.5; margin-top:12px; max-width:340px;}
  .pill{display:inline-flex; align-items:center; gap:8px; background:rgba(var(--glowrgb),.14); border:1px solid var(--line); color:var(--text); font-weight:600; font-size:13px; padding:7px 14px; border-radius:999px; margin-top:16px;}

  .cta-go{margin-top:24px; background:var(--amber); color:var(--deep); border:none; font-family:var(--sans); font-weight:800; font-size:16px; padding:15px 30px; border-radius:999px; cursor:pointer; box-shadow:0 10px 26px rgba(var(--glowrgb),.30); transition:transform .08s, filter .15s;}
  .cta-go:hover{filter:brightness(1.05);} .cta-go:active{transform:scale(.97);}

  .diagram{margin:2px auto;}
  .cname{font-family:var(--serif); font-weight:700; font-size:30px; margin-top:2px;}
  .cfull{color:var(--muted); font-size:13px; margin-top:-2px;}

  /* warm-up tappable chord cards */
  .ccards{display:flex; gap:10px; justify-content:center; margin:14px 0 2px;}
  .ccard{min-width:64px; padding:12px 8px; border-radius:14px; border:1px solid var(--line); background:var(--card); color:var(--text); font-family:var(--serif); font-weight:700; font-size:22px; cursor:pointer; transition:all .18s;}
  .ccard.on{background:var(--amber); color:var(--deep); border-color:var(--amber); transform:translateY(-3px); box-shadow:0 10px 24px rgba(var(--glowrgb),.34);}

  /* ===== THE HIGHWAY ===== */
  .hwy{position:relative; width:250px; height:300px; margin:4px auto 0; border-radius:18px; overflow:hidden;
       background:radial-gradient(120% 60% at 50% 100%, rgba(var(--glowrgb),.20), transparent 62%), linear-gradient(180deg,#241a0d 0%, #150e07 56%, #0d0804 100%);
       border:1px solid #4a3920; box-shadow:inset 0 0 44px rgba(0,0,0,.62), 0 16px 44px rgba(0,0,0,.5);}
  .hwy .edge{position:absolute; top:0; bottom:0; width:2px; background:linear-gradient(180deg,transparent, rgba(var(--glowrgb),.55)); box-shadow:0 0 10px rgba(var(--glowrgb),.5);}
  .hwy .edge.l{left:40px; transform:skewX(9deg); transform-origin:bottom;}
  .hwy .edge.r{right:40px; transform:skewX(-9deg); transform-origin:bottom;}
  .hitline{position:absolute; left:10px; right:10px; bottom:48px; height:4px; border-radius:3px; background:var(--amber);
           box-shadow:0 0 16px 3px rgba(var(--glowrgb),.85), 0 0 42px 9px rgba(var(--glowrgb),.32); animation:hlpulse 1.1s ease-in-out infinite;}
  @keyframes hlpulse{0%,100%{opacity:.85;} 50%{opacity:1;}}
  .htile{position:absolute; left:50%; top:-50px; transform:translateX(-50%); width:72px; height:48px; border-radius:13px;
         display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-weight:700; font-size:23px;
         color:#2a1c08; background:linear-gradient(180deg,#ffdc92,var(--amber));
         box-shadow:0 0 22px 2px rgba(var(--glowrgb),.55), inset 0 1px 0 rgba(255,255,255,.55); will-change:top;}
  .htile::after{content:""; position:absolute; left:7px; right:7px; top:-50px; height:50px; border-radius:13px;
                background:linear-gradient(180deg,transparent, rgba(var(--glowrgb),.22));}
  .htile.pop{animation:tpop .2s ease;}
  @keyframes tpop{0%{transform:translateX(-50%) scale(1);} 42%{transform:translateX(-50%) scale(1.2); filter:brightness(1.6);} 100%{transform:translateX(-50%) scale(1);}}
  .burst{position:absolute; transform:translate(-50%,-50%) scale(.2); width:130px; height:130px; border-radius:50%; pointer-events:none;
         background:radial-gradient(circle, rgba(255,238,196,.95), rgba(var(--glowrgb),.5) 38%, transparent 70%); animation:burst .5s ease-out forwards;}
  @keyframes burst{to{transform:translate(-50%,-50%) scale(1.55); opacity:0;}}
  .spark{position:absolute; width:6px; height:6px; border-radius:50%; background:#ffe6b0; box-shadow:0 0 8px rgba(var(--glowrgb),.95); pointer-events:none;}
  .ember{position:absolute; bottom:-8px; width:4px; height:4px; border-radius:50%; background:rgba(var(--glowrgb),.7); box-shadow:0 0 6px rgba(var(--glowrgb),.7); pointer-events:none; animation:rise linear forwards;}
  @keyframes rise{to{transform:translateY(-310px); opacity:0;}}
  .combo{position:absolute; top:8px; left:0; right:0; text-align:center; font-family:var(--serif); font-weight:700; color:#ffe6b0; text-shadow:0 0 16px rgba(var(--glowrgb),.85); opacity:0; transition:opacity .2s, transform .12s;}
  .combo.show{opacity:1;} .combo .x{font-size:15px; opacity:.8;}
  .combo.bump{transform:scale(1.18);}
  .perfect{position:absolute; left:0; right:0; bottom:12px; text-align:center; font-weight:800; font-size:13.5px; letter-spacing:1px; color:#fff; text-shadow:0 0 12px rgba(var(--glowrgb),.9); opacity:0;}
  .perfect.show{animation:pf .62s ease;}
  @keyframes pf{0%{opacity:0; transform:translateY(8px);} 30%{opacity:1; transform:none;} 100%{opacity:0;}}
  .countin{position:absolute; left:0; right:0; top:40%; text-align:center; font-family:var(--serif); font-weight:700; font-size:62px; color:#ffe6b0; text-shadow:0 0 26px rgba(var(--glowrgb),.85); pointer-events:none;}
  .countin.go{font-size:46px;}
  .songname{font-family:var(--serif); font-weight:700; font-size:20px; margin-top:12px;}
  .songsub{color:var(--muted); font-size:13px; margin-top:2px; letter-spacing:1.5px;}

  .bar{border-top:1px solid var(--line); background:var(--card); padding:13px 16px calc(13px + env(safe-area-inset-bottom)); display:flex; align-items:center; gap:12px; min-height:64px;}
  .bar.hide{display:none;}
  .info{flex:1; min-width:0; text-align:left;}
  .dots{display:flex; gap:5px; margin-bottom:6px;}
  .dots i{width:30px; height:4px; border-radius:2px; background:var(--line); transition:background .25s;}
  .dots i.on{background:var(--amber);}
  .step{font-size:13.5px; font-weight:700; color:var(--text);}
  .ssub{font-size:12.5px; color:var(--muted); margin-top:1px; line-height:1.3;}
  .next{flex:0 0 auto; background:var(--amber); color:var(--deep); border:none; font-family:var(--sans); font-weight:800; font-size:15px; padding:11px 22px; border-radius:999px; cursor:pointer;}
  .next:active{transform:scale(.97);}

  .fin .emoji{font-size:46px;}
  .credit{margin-top:8px; color:var(--muted); font-size:12px;}
  .badge-live{display:inline-flex;align-items:center;gap:7px;background:rgba(15,138,95,.16);border:1px solid rgba(15,138,95,.5);color:#5fd0a6;font-weight:700;font-size:12px;letter-spacing:.5px;text-transform:uppercase;padding:5px 12px;border-radius:999px;}
  .badge-live .d{width:7px;height:7px;border-radius:50%;background:#36c98e;box-shadow:0 0 8px #36c98e;}
  .streak{display:inline-flex;align-items:center;gap:7px;margin-top:14px;background:rgba(var(--glowrgb),.12);border:1px solid var(--line);color:var(--text);font-weight:700;font-size:13px;padding:7px 14px;border-radius:999px;}

  .conf{position:absolute;top:-16px;width:9px;height:14px;border-radius:2px;pointer-events:none;z-index:50;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(640px) rotate(540deg);opacity:.2;}}
  .fade{animation:fadein .35s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  @media (max-width:380px){ .big{font-size:26px;} .demo{min-height:560px;} }
</style>
</head>
<body>
<div class="demo" id="demo">
  <div class="top">
    <div class="wm"><span class="a">ESPO</span><span class="b">Music</span></div>
    <div class="tag">It's never too late to play.</div>
    <div class="rule"></div>
  </div>
  <div class="screen" id="scr"></div>
  <div class="bar hide" id="bar">
    <div class="info">
      <div class="dots"><i></i><i></i></div>
      <div class="step" id="bStep">Step 1 of 2</div>
      <div class="ssub" id="bSub"></div>
    </div>
    <button class="next" id="bNext">Next</button>
  </div>
</div>

<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var scr=$('scr'), bar=$('bar'), bStep=$('bStep'), bSub=$('bSub'), bNext=$('bNext');
  var ESPO='https://espomusic.com';

  /* ---------- chord diagrams (guitar) ---------- */
  var SHAPES={ Em:'022000', Am:'x02210', C:'x32010', G:'320003', D:'xx0232' };
  var FULL={ Em:'E minor', Am:'A minor', C:'C major', G:'G major', D:'D major' };
  function diagram(name){
    var p=SHAPES[name]||'xxxxxx', W=128,H=146, L=22,R=W-22, T=32,B=H-20;
    var sx=(R-L)/5, fy=(B-T)/4, svg='';
    svg+='<svg class="diagram" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">';
    svg+='<rect x="'+L+'" y="'+T+'" width="'+(R-L)+'" height="'+(B-T)+'" rx="3" fill="none" stroke="#5a4427" stroke-width="1.5"/>';
    svg+='<rect x="'+(L-1)+'" y="'+(T-4)+'" width="'+(R-L+2)+'" height="4" fill="#9c7a44"/>';
    for(var f=1;f<4;f++){var y=T+fy*f;svg+='<line x1="'+L+'" y1="'+y+'" x2="'+R+'" y2="'+y+'" stroke="#3a2c1c" stroke-width="1"/>';}
    for(var s=0;s<6;s++){var x=L+sx*s;svg+='<line x1="'+x+'" y1="'+T+'" x2="'+x+'" y2="'+B+'" stroke="#5a4427" stroke-width="1"/>';}
    for(var s2=0;s2<6;s2++){
      var c=p[s2], x2=L+sx*s2;
      if(c==='x'){ svg+='<text x="'+x2+'" y="'+(T-9)+'" fill="#a8927a" font-size="12" text-anchor="middle" font-family="Inter">×</text>'; }
      else if(c==='0'){ svg+='<circle cx="'+x2+'" cy="'+(T-13)+'" r="4.5" fill="none" stroke="#d6b06a" stroke-width="1.5"/>'; }
      else { var fr=parseInt(c,10), cy=T+fy*(fr-0.5); svg+='<circle cx="'+x2+'" cy="'+cy+'" r="8.5" fill="#eaa83a"/>'; svg+='<text x="'+x2+'" y="'+(cy+4)+'" fill="#1a1207" font-size="11" font-weight="700" text-anchor="middle" font-family="Inter">'+fr+'</text>'; }
    }
    svg+='</svg>'; return svg;
  }

  /* ---------- audio: Karplus-Strong plucked string (real guitar tone) ---------- */
  var AC=null;
  var FREQ={
    Em:[82.41,123.47,164.81,196.00,246.94,329.63],
    Am:[null,110.00,164.81,220.00,261.63,329.63],
    G:[98.00,123.47,146.83,196.00,246.94,392.00],
    C:[null,130.81,164.81,196.00,261.63,329.63],
    D:[null,null,146.83,220.00,293.66,369.99]
  };
  function ksPluck(freq, t, gain){
    var sr=AC.sampleRate, N=Math.max(2,Math.round(sr/freq));
    var dur=2.2, len=(sr*dur)|0, buf=AC.createBuffer(1,len,sr), d=buf.getChannelData(0);
    var ring=new Float32Array(N), lp0=0;
    for(var i=0;i<N;i++){ lp0=((Math.random()*2-1)+lp0)*0.5; ring[i]=lp0; }
    var pos=0, decay=0.9961;
    for(var s=0;s<len;s++){ var cur=ring[pos]; d[s]=cur; ring[pos]=(cur+ring[(pos+1)%N])*0.5*decay; pos=(pos+1)%N; }
    var atk=(sr*0.003)|0; for(var a=0;a<atk;a++){ d[a]*=a/atk; }
    var rel=(sr*0.15)|0; for(var r=0;r<rel;r++){ d[len-1-r]*=r/rel; }
    var src=AC.createBufferSource(); src.buffer=buf;
    var g=AC.createGain(); g.gain.value=gain;
    var hp=AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=75;
    var lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=4200; lp.Q.value=0.5;
    src.connect(g); g.connect(hp); hp.connect(lp); lp.connect(AC.destination);
    src.start(t); src.stop(t+dur);
  }
  function strum(name){
    try{
      AC=AC||new (window.AudioContext||window.webkitAudioContext)();
      if(AC.state==='suspended') AC.resume();
      var fr=FREQ[name]||FREQ.Em, t0=AC.currentTime+0.02, k=0;
      fr.forEach(function(f){ if(!f) return; ksPluck(f, t0+k*0.05, 0.15); k++; });
    }catch(e){}
  }

  /* ---------- confetti ---------- */
  function confetti(){
    var demo=$('demo'), cols=['#eaa83a','#c8702a','#f3e7d4','#5fd0a6'];
    for(var i=0;i<70;i++){(function(){
      var c=document.createElement('div'); c.className='conf';
      c.style.left=(Math.random()*100)+'%';
      c.style.background=cols[i%cols.length];
      c.style.animationDuration=(1.6+Math.random()*1.4)+'s';
      c.style.animationDelay=(Math.random()*0.5)+'s';
      c.style.transform='rotate('+(Math.random()*360)+'deg)';
      demo.appendChild(c); setTimeout(function(){c.remove();},3600);
    })();}
  }

  /* ---------- timers ---------- */
  function clearHwy(){ if(window._hwyTimers){ window._hwyTimers.forEach(function(t){clearInterval(t);}); } window._hwyTimers=[]; }

  /* ---------- step machine ---------- */
  var idx=-1;
  var steps=[
    { label:'Warm up', sub:'Tap your chords — real guitar tone.', render:renderWarm },
    { label:'The Highway', sub:'Nail each chord as it lands.', render:renderHighway }
  ];

  function intro(){
    clearHwy();
    bar.classList.add('hide');
    scr.className='screen fade';
    scr.innerHTML=
      '<div class="badge-live"><span class="d"></span> Now live</div>'+
      '<div class="big" style="margin-top:16px;">Your 5 minutes<br>today</div>'+
      '<div class="sub">Warm up your chords, then ride <b>The Highway</b> — the rhythm lane that turns practice into play.</div>'+
      '<div class="pill">Warm up &middot; The Highway</div>'+
      '<button class="cta-go" id="startBtn">Start my 5 minutes ▶</button>'+
      '<div class="credit">An interactive taste of ESPO&nbsp;Music</div>';
    $('startBtn').onclick=function(){ try{strum('Em');}catch(e){} idx=0; go(); };
  }

  function go(){
    clearHwy();
    var s=steps[idx];
    bar.classList.remove('hide');
    bStep.textContent='Step '+(idx+1)+' of '+steps.length+' · '+s.label;
    bSub.textContent=s.sub;
    var dots=bar.querySelectorAll('.dots i'); for(var i=0;i<dots.length;i++) dots[i].classList.toggle('on', i<=idx);
    bNext.textContent=(idx===steps.length-1)?'Finish':'Next';
    s.render();
  }

  /* ----- Step 1: tappable warm-up chords ----- */
  function renderWarm(){
    scr.className='screen fade';
    var chords=['Em','Am','C'], sel='Em';
    scr.innerHTML=
      '<div class="kick">Warm up</div>'+
      '<div id="wDia">'+diagram(sel)+'</div>'+
      '<div class="cname" id="wName">'+sel+'</div><div class="cfull" id="wFull">'+FULL[sel]+'</div>'+
      '<div class="ccards" id="wCards"></div>'+
      '<div class="sub" style="margin-top:12px;">Tap each one to hear it — the same shapes you\'ll nail on The Highway in a sec.</div>';
    var wrap=$('wCards');
    chords.forEach(function(c){
      var b=document.createElement('button'); b.className='ccard'+(c===sel?' on':''); b.textContent=c;
      b.onclick=function(){
        $('wDia').innerHTML=diagram(c); $('wName').textContent=c; $('wFull').textContent=FULL[c];
        wrap.querySelectorAll('.ccard').forEach(function(x){x.classList.remove('on');}); b.classList.add('on');
        strum(c);
      };
      wrap.appendChild(b);
    });
  }

  /* ----- Step 2: THE HIGHWAY (the shine) ----- */
  function renderHighway(){
    clearHwy();
    scr.className='screen fade';
    scr.innerHTML=
      '<div class="kick">The Highway</div>'+
      '<div class="hwy" id="hwy">'+
        '<div class="edge l"></div><div class="edge r"></div>'+
        '<div class="hitline"></div>'+
        '<div class="combo" id="combo"></div>'+
        '<div class="perfect" id="pf">Perfect!</div>'+
        '<div class="countin" id="ci">3</div>'+
      '</div>'+
      '<div class="songname">Campfire classic</div><div class="songsub">G &middot; C &middot; D &middot; Em</div>'+
      '<div class="sub" style="margin-top:10px;">Chords fly down <b>The Highway</b> — strum each one the moment it hits the line. Watch the combo climb.</div>';
    var hwy=$('hwy'), comboEl=$('combo'), pf=$('pf'), ci=$('ci');
    var prog=['G','C','D','Em','G','C','D','G'], k=0, combo=0;
    var LANE_H=300, HITY=226, BURST_Y=250;   // tile-top at hit / burst centre

    // count-in 3 · 2 · 1 · GO
    var cn=['3','2','1','GO'], ciIdx=0; ci.textContent=cn[0];
    var ciT=setInterval(function(){
      ciIdx++;
      if(ciIdx>=cn.length){ clearInterval(ciT); ci.style.display='none'; startFall(); }
      else { ci.textContent=cn[ciIdx]; ci.classList.toggle('go', cn[ciIdx]==='GO'); ci.style.animation='none'; void ci.offsetWidth; ci.style.animation='pf .5s ease'; }
    },520);
    window._hwyTimers.push(ciT);

    // ambient embers
    var embT=setInterval(function(){
      if(!document.body.contains(hwy)){ clearInterval(embT); return; }
      var e=document.createElement('div'); e.className='ember';
      e.style.left=(12+Math.random()*76)+'%'; e.style.animationDuration=(2.2+Math.random()*1.6)+'s';
      hwy.appendChild(e); setTimeout(function(){e.remove();},4200);
    },340);
    window._hwyTimers.push(embT);

    function onHit(tile,name){
      strum(name);
      tile.classList.add('pop');
      combo++;
      comboEl.innerHTML=combo+'<span class="x">×</span>';
      comboEl.classList.add('show'); comboEl.classList.add('bump');
      comboEl.style.fontSize=(24+Math.min(combo,10))+'px';
      setTimeout(function(){comboEl.classList.remove('bump');},130);
      pf.textContent = combo>=6 ? ('PERFECT ×'+combo) : 'Perfect!';
      pf.classList.remove('show'); void pf.offsetWidth; pf.classList.add('show');
      // burst + sparks at the hit-line
      var bx=hwy.clientWidth/2;
      var b=document.createElement('div'); b.className='burst'; b.style.left=bx+'px'; b.style.top=BURST_Y+'px';
      hwy.appendChild(b); setTimeout(function(){b.remove();},520);
      for(var i=0;i<9;i++){(function(i){
        var s=document.createElement('div'); s.className='spark'; s.style.left=bx+'px'; s.style.top=BURST_Y+'px'; hwy.appendChild(s);
        var ang=Math.PI*2*i/9, dist=30+Math.random()*28, sx=Math.cos(ang)*dist, sy=Math.sin(ang)*dist;
        s.animate([{transform:'translate(-50%,-50%)',opacity:1},{transform:'translate(calc(-50% + '+sx+'px), calc(-50% + '+sy+'px))',opacity:0}],{duration:480,easing:'ease-out'});
        setTimeout(function(){s.remove();},500);
      })(i);}
      // tile flashes then clears
      setTimeout(function(){ tile.style.transition='opacity .22s, top .22s linear'; tile.style.opacity='0'; tile.style.top=(HITY+30)+'px'; setTimeout(function(){tile.remove();},240); },110);
    }

    function spawnTile(){
      if(!document.body.contains(hwy)){ return; }
      var name=prog[k%prog.length]; k++;
      var tile=document.createElement('div'); tile.className='htile'; tile.textContent=name; hwy.appendChild(tile);
      var start=performance.now(), dur=1150, fromY=-50, hit=false;
      function frame(now){
        if(!document.body.contains(hwy)){ return; }
        var p=Math.min(1,(now-start)/dur), y=fromY+(HITY-fromY)*p; tile.style.top=y+'px';
        if(!hit && p>=1){ hit=true; onHit(tile,name); return; }
        if(p<1) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }
    function startFall(){ spawnTile(); var ft=setInterval(spawnTile, 920); window._hwyTimers.push(ft); }
  }

  function finish(){
    clearHwy();
    bar.classList.add('hide');
    scr.className='screen fade fin';
    scr.innerHTML=
      '<div class="emoji">🔥</div>'+
      '<div class="big" style="margin-top:8px;">Nice run!</div>'+
      '<div class="sub">That\'s The Highway inside ESPO Music — guitar, piano, harmonica &amp; ukulele. Five minutes a day, a streak that keeps you coming back, and real songs waiting.</div>'+
      '<div class="streak">🔥 Day 1 streak started</div>'+
      '<a class="cta-go" href="'+ESPO+'" target="_blank" rel="noopener" style="text-decoration:none;display:inline-block;">Play free at espomusic.com →</a>'+
      '<button class="hearbtn cta-go" id="again" style="background:transparent;color:var(--amber);border:1px solid var(--amber);box-shadow:none;margin-top:12px;">↻ Run it again</button>';
    confetti(); strum('G');
    $('again').onclick=intro;
  }

  bNext.onclick=function(){
    if(idx>=steps.length-1){ finish(); return; }
    idx++; go();
  };

  intro();
})();
</script>
</body>
</html>
