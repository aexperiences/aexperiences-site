<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ESPO Racket app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d5c66"/>
      <stop offset="0.5" stop-color="#12896b"/>
      <stop offset="1" stop-color="#3fb14a"/>
    </linearGradient>
    <linearGradient id="ball" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8ff5a"/>
      <stop offset="1" stop-color="#c6f21e"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#04262a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- FULL-BLEED tile (square; the store applies the rounded mask) -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#sheen)"/>

  <!-- rally / sound-energy arcs radiating from the strike -->
  <g stroke="#ffffff" fill="none" stroke-linecap="round" opacity="0.55">
    <path d="M690 300 a250 250 0 0 1 0 424" stroke-width="20" opacity="0.28"/>
    <path d="M726 262 a312 312 0 0 1 0 500" stroke-width="16" opacity="0.18"/>
    <path d="M760 226 a374 374 0 0 1 0 572" stroke-width="12" opacity="0.11"/>
  </g>

  <!-- racket -->
  <g filter="url(#soft)" transform="rotate(-32 470 520)">
    <rect x="440" y="560" width="60" height="300" rx="30" fill="#ffffff"/>
    <rect x="452" y="600" width="36" height="210" rx="18" fill="#0d5c66" opacity="0.25"/>
    <path d="M420 560 q50 -40 100 0 l-14 40 q-36 -26 -72 0 z" fill="#ffffff"/>
    <ellipse cx="470" cy="360" rx="196" ry="222" fill="none" stroke="#ffffff" stroke-width="52"/>
    <g stroke="#ffffff" stroke-width="12" opacity="0.9">
      <line x1="380" y1="200" x2="380" y2="520"/>
      <line x1="470" y1="168" x2="470" y2="552"/>
      <line x1="560" y1="200" x2="560" y2="520"/>
      <line x1="304" y1="290" x2="636" y2="290"/>
      <line x1="292" y1="380" x2="648" y2="380"/>
      <line x1="316" y1="470" x2="624" y2="470"/>
    </g>
  </g>

  <!-- ball at the strike point -->
  <g filter="url(#soft)">
    <circle cx="670" cy="512" r="132" fill="url(#ball)"/>
    <path d="M582 452 q88 60 0 120 M758 452 q-88 60 0 120" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- family tick -->
  <rect x="360" y="900" width="304" height="26" rx="13" fill="#ffffff" opacity="0.85"/>
</svg>
