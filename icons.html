<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Collection — AE App Shop · Accelerated Experiences, LLC</title>
<meta name="description" content="An art gallery of the AE App Shop consumer icons — the artwork behind the ESPO family and friends, by Accelerated Experiences, LLC.">
<meta name="theme-color" content="#0c0a09">
<meta property="og:title" content="The Collection — AE App Shop">
<meta property="og:description" content="The artwork behind the AE App Shop — the consumer app icons, as a gallery.">
<link rel="icon" href="/ae-disc.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0a09; --ink:#f3ecdf; --mut:#9c9184; --gold:#e6b352;
    --accent:#e6b352;            /* shifts to the centered icon's color */
    --serif:'Fraunces',Georgia,serif; --sans:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; min-height:100dvh; color:var(--ink); font-family:var(--sans); overflow-x:hidden;
    background:#0c0a09;
    display:flex; flex-direction:column;
  }
  /* ambient glow that tracks the focused icon's colour */
  .ambient{position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(58vw 60vh at 50% 40%, color-mix(in srgb, var(--accent) 34%, transparent) 0%, transparent 62%),
      radial-gradient(90vw 70vh at 50% 120%, color-mix(in srgb, var(--accent) 16%, transparent) 0%, transparent 60%),
      #0c0a09;
    transition:background 1.1s ease;}
  .grain{position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.05; mix-blend-mode:overlay;
    background-image:radial-gradient(circle at 25% 25%, #fff 0.5px, transparent 0.6px); background-size:3px 3px;}
  .wrap{position:relative; z-index:2; flex:1 1 auto; display:flex; flex-direction:column; min-height:0;}

  /* top */
  .top{flex:0 0 auto; text-align:center; padding:34px 20px 4px;}
  .kick{font-size:12px; font-weight:800; letter-spacing:.34em; text-transform:uppercase; color:var(--mut);}
  .ttl{font-family:var(--serif); font-weight:500; font-size:clamp(30px,6vw,52px); letter-spacing:-.01em; margin:10px 0 4px;}
  .ttl em{font-style:italic; color:var(--gold);}
  .sub{color:var(--mut); font-size:14.5px; max-width:520px; margin:6px auto 0; line-height:1.5;}

  /* gallery rail */
  .stagewrap{flex:1 1 auto; min-height:0; position:relative; display:flex; align-items:center;}
  .stage{
    display:flex; align-items:center; gap:clamp(26px,5vw,64px);
    overflow-x:auto; overflow-y:hidden; width:100%;
    scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
    padding:40px max(10vw, calc(50vw - 130px)); cursor:grab;
    scrollbar-width:none;
  }
  .stage::-webkit-scrollbar{display:none;}
  .stage.drag{cursor:grabbing; scroll-snap-type:none;}
  .frame{
    scroll-snap-align:center; flex:0 0 auto; text-align:center;
    transform:scale(.72); opacity:.4;
    transition:transform .5s cubic-bezier(.22,1,.36,1), opacity .5s ease;
    will-change:transform, opacity;
  }
  .frame.focus{transform:scale(1); opacity:1;}
  .art{
    width:clamp(150px,42vw,232px); height:clamp(150px,42vw,232px);
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .art img{
    width:100%; height:100%; object-fit:contain; border-radius:23%;
    pointer-events:none; user-select:none; -webkit-user-drag:none;
    filter:drop-shadow(0 26px 40px rgba(0,0,0,.6));
    -webkit-box-reflect:below 14px linear-gradient(transparent 62%, rgba(255,255,255,.14));
  }
  .frame.focus .art::after{
    content:""; position:absolute; inset:-14%; border-radius:30%; z-index:-1;
    background:radial-gradient(closest-side, color-mix(in srgb, var(--g) 60%, transparent), transparent 72%);
    filter:blur(14px);
  }
  .cap{font-family:var(--serif); font-weight:500; font-size:16px; margin-top:26px; letter-spacing:.01em;
    opacity:0; transform:translateY(6px); transition:opacity .5s ease .05s, transform .5s ease .05s;}
  .frame.focus .cap{opacity:1; transform:none;}

  /* arrows (desktop) */
  .nav{position:absolute; top:50%; transform:translateY(-50%); z-index:5;
    width:52px; height:52px; border-radius:50%; border:1px solid rgba(255,255,255,.16);
    background:rgba(20,17,14,.5); backdrop-filter:blur(8px); color:var(--ink);
    display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.18s;}
  .nav:hover{border-color:var(--accent); background:rgba(20,17,14,.8);}
  .nav svg{width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}
  .nav.prev{left:18px;} .nav.next{right:18px;}
  @media(hover:none){.nav{display:none;}}

  /* dots */
  .dots{flex:0 0 auto; display:flex; gap:7px; justify-content:center; flex-wrap:wrap; padding:2px 20px 6px; max-width:640px; margin:0 auto;}
  .dot{width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.22); transition:.3s; cursor:pointer;}
  .dot.on{background:var(--accent); transform:scale(1.5);}

  /* AE App Shop logo below */
  .shopmark{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:12px;
    padding:20px 20px calc(24px + env(safe-area-inset-bottom));}
  .shopmark .disc{width:44px; height:44px; border-radius:50%; box-shadow:0 6px 18px -6px rgba(0,0,0,.7);}
  .shopmark .word{font-family:var(--serif); font-weight:500; font-size:clamp(20px,4.4vw,27px); letter-spacing:.02em;}
  .shopmark .word b{color:var(--gold); font-weight:600;}
  .shopmark .rule{width:40px; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:.6;}
  .shopmark .credit{font-size:11.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--mut);}
  .hint{position:fixed; left:50%; bottom:14px; transform:translateX(-50%); z-index:6; font-size:11px; letter-spacing:.2em;
    text-transform:uppercase; color:var(--mut); opacity:.7; pointer-events:none; transition:opacity .6s; display:none;}
</style>
</head>
<body>
  <div class="ambient" id="ambient"></div>
  <div class="grain"></div>

  <div class="wrap">
    <div class="top">
      <div class="kick">Accelerated Experiences</div>
      <div class="ttl">The <em>Collection</em></div>
      <div class="sub">The artwork behind the AE App Shop — every consumer app icon, made in-house. Swipe through the gallery.</div>
    </div>

    <div class="stagewrap">
      <button class="nav prev" id="prev" aria-label="Previous"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="stage" id="stage"></div>
      <button class="nav next" id="next" aria-label="Next"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>

    <div class="dots" id="dots"></div>

    <div class="shopmark">
      <img class="disc" src="/ae-disc.png" alt="">
      <div class="rule"></div>
      <div class="word">AE&nbsp;<b>App&nbsp;Shop</b></div>
      <div class="credit">Accelerated Experiences, LLC</div>
    </div>
  </div>

  <div class="hint" id="hint">drag · swipe · ← →</div>

<script>
(function(){
  "use strict";
  // The consumer (B2C) collection only. Art, not links.
  var ICONS=[
    {n:'ESPO Music',    f:'/logo-music.png',              g:'#e6b352'},
    {n:'ESPO Learning', f:'/marks/espolearning-icon.png', g:'#6fb373'},
    {n:'ESPO Genius',   f:'/logo-genius.png',             g:'#8f83f0'},
    {n:'ESPO Drama',    f:'/logo-drama.png',              g:'#e08a52'},
    {n:'ESPOsocial',    f:'/logo-social.png',             g:'#6f74e6'},
    {n:'The Narcs',     f:'/logo-narcs.png',              g:'#3fb89c'},
    {n:'Neuro Divulge', f:'/logo-nd.png',                 g:'#c98a5a'},
    {n:'AEfunkmaster',  f:'/ae-disc.png',                 g:'#5fb36a'},
    {n:'ESPOvocab',     f:'/marks/espovocab.svg',         g:'#5ea888'},
    {n:'ESPOtendency',  f:'/marks/espotendency.svg',      g:'#54c0d0'},
    {n:'ESPOnest',      f:'/marks/esponest.svg',          g:'#cf94ba'},
    {n:'ESPOhystory',   f:'/apps/espohystory/icon.svg',   g:'#d3a24e'},
    {n:'ESPOregulator', f:'/marks/esporegulator.svg',     g:'#5fc0c0'},
    {n:'ESPOtrek',      f:'/marks/espotrek.svg',          g:'#e6924e'},
    {n:'ESPOnatlparks', f:'/marks/esponatlparks.svg',     g:'#66b268'},
    {n:'ESPOsign',      f:'/marks/esposign.svg',          g:'#d6b658'},
    {n:'ESPOvineyard',  f:'/marks/espovineyard.svg',      g:'#c05a74'},
    {n:'ESPOracket',    f:'/marks/esporacket.svg',        g:'#bcd85a'}
  ];
  var stage=document.getElementById('stage'),
      dotsEl=document.getElementById('dots'),
      ambient=document.getElementById('ambient'),
      hint=document.getElementById('hint');

  ICONS.forEach(function(it,i){
    var f=document.createElement('div'); f.className='frame'; f.dataset.i=i; f.style.setProperty('--g',it.g);
    var art=document.createElement('div'); art.className='art';
    var img=document.createElement('img'); img.src=it.f; img.alt=it.n+' — app icon'; img.draggable=false; img.decoding='async';
    art.appendChild(img);
    var cap=document.createElement('div'); cap.className='cap'; cap.textContent=it.n;
    f.appendChild(art); f.appendChild(cap); stage.appendChild(f);
    var d=document.createElement('div'); d.className='dot'; d.dataset.i=i; dotsEl.appendChild(d);
  });
  var frames=[].slice.call(stage.querySelectorAll('.frame'));
  var dots=[].slice.call(dotsEl.querySelectorAll('.dot'));
  var current=-1;

  function setFocus(i){
    if(i<0 || i>=frames.length || i===current) return; current=i;
    for(var k=0;k<frames.length;k++){ frames[k].classList.toggle('focus', k===i); }
    for(var d=0;d<dots.length;d++){ dots[d].classList.toggle('on', d===i); }
    var g=ICONS[i].g;
    document.documentElement.style.setProperty('--accent', g);
    ambient.style.setProperty('--accent', g);
  }
  function centerX(f){ var r=f.getBoundingClientRect(); return r.left + r.width/2; }
  function nearest(){
    var cx=window.innerWidth/2, best=0, bestD=1e9;
    for(var k=0;k<frames.length;k++){ var d=Math.abs(centerX(frames[k])-cx); if(d<bestD){ bestD=d; best=k; } }
    return best;
  }
  // scroll the rail so frame i sits dead centre, AND light it up immediately (don't wait on the scroll event)
  function goTo(i,smooth){
    i=Math.max(0,Math.min(frames.length-1,i)); var f=frames[i]; if(!f) return;
    var target=f.offsetLeft-(stage.clientWidth-f.offsetWidth)/2;
    try{ stage.scrollTo({left:target, behavior:smooth?'smooth':'auto'}); }catch(e){ stage.scrollLeft=target; }
    setFocus(i);
  }
  // as the user swipes/scrolls, keep the centred icon lit (recompute every frame — cheap for 18)
  var ticking=false;
  stage.addEventListener('scroll',function(){ if(ticking) return; ticking=true; requestAnimationFrame(function(){ ticking=false; setFocus(nearest()); }); }, {passive:true});

  // mouse drag-to-scroll (touch swipes natively)
  var down=false, sx=0, sl=0, moved=false;
  stage.addEventListener('pointerdown',function(e){ if(e.pointerType==='touch') return; down=true; moved=false; sx=e.clientX; sl=stage.scrollLeft; stage.classList.add('drag'); try{ stage.setPointerCapture(e.pointerId); }catch(_){}} );
  stage.addEventListener('pointermove',function(e){ if(!down) return; var dx=e.clientX-sx; if(Math.abs(dx)>3) moved=true; stage.scrollLeft=sl-dx; setFocus(nearest()); });
  function endDrag(){ if(!down) return; down=false; stage.classList.remove('drag'); if(moved) goTo(nearest(),true); }
  stage.addEventListener('pointerup',endDrag); stage.addEventListener('pointercancel',endDrag); stage.addEventListener('pointerleave',endDrag);
  // vertical wheel / trackpad moves the rail sideways
  stage.addEventListener('wheel',function(e){ if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){ stage.scrollLeft+=e.deltaY; e.preventDefault(); } },{passive:false});

  document.getElementById('prev').addEventListener('click',function(){ goTo(current-1,true); });
  document.getElementById('next').addEventListener('click',function(){ goTo(current+1,true); });
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'){ goTo(current+1,true); e.preventDefault(); }
    if(e.key==='ArrowLeft'){ goTo(current-1,true); e.preventDefault(); }
  });
  dots.forEach(function(d,i){ d.addEventListener('click',function(){ goTo(i,true); }); });

  function boot(){ goTo(0,false); setFocus(0); if(window.innerWidth<760 && hint){ hint.style.display='block'; setTimeout(function(){ hint.style.opacity='0'; },2600); } }
  if(document.readyState==='complete') boot(); else window.addEventListener('load',boot);
})();
</script>
</body>
</html>
