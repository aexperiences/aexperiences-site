<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#122a18">
<title>Showroom — Accelerated Experiences, LLC</title>
<meta name="description" content="Walk into a working hub. Real software, real screens, nothing to install.">
<link rel="icon" href="/ae-disc.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --forest:#1c3d22; --forest-d:#122a18; --forest-dd:#0c1d10; --forest-l:#25502d;
  --acc:#c8794f; --acc2:#a85f38; --gold:#e0a83a;
  --cream:#f4eede; --cream-2:#d8cfb8; --mute:#9db09f;
  --line:rgba(255,255,255,.10); --line-2:rgba(255,255,255,.17);
  --good:#6fc98a; --warn:#e0a83a; --bad:#d9694f;
  --sans:'Outfit',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:'Space Grotesk',ui-monospace,monospace;
  --tap:46px; --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box} html,body{margin:0;background:var(--forest-d)}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--sans);color:var(--cream);overflow-x:hidden}
img{max-width:100%;display:block} a{color:inherit}
button{font:inherit;color:inherit;border:none;background:none;cursor:pointer}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:8px}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}

/* honest demo banner — never let anyone think this is their live data */
.demo{background:var(--gold);color:#231a06;font-size:12.5px;font-weight:700;text-align:center;padding:7px 14px;line-height:1.4}
.demo a{color:#231a06;text-decoration:underline}

/* back to store — this page always has a way out */
.back{background:var(--forest-dd);border-bottom:1px solid var(--line)}
.back .in{max-width:1240px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:10px;min-height:46px}
.back a{display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:600;text-decoration:none;padding:0 11px 0 7px;min-height:36px;border-radius:9px}
.back a:hover{background:rgba(255,255,255,.08)}
.back svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.back .sp{flex:1}
.back .buy{background:linear-gradient(180deg,var(--acc),var(--acc2));color:#fff;font-weight:700;padding:0 15px}

/* the app chrome */
.app{display:grid;grid-template-columns:1fr;max-width:1240px;margin:0 auto;min-height:60vh}
@media(min-width:960px){ .app{grid-template-columns:216px 1fr} }
.side{display:none;border-right:1px solid var(--line);padding:18px 12px 40px}
@media(min-width:960px){ .side{display:block} }
.brand{display:flex;align-items:center;gap:10px;padding:0 8px 16px;margin-bottom:10px;border-bottom:1px solid var(--line)}
.brand .mk{width:36px;height:36px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:15px;color:#fff}
.brand .bn{font-weight:800;font-size:14.5px;line-height:1.15}
.brand .bs{font-size:11px;color:var(--mute);margin-top:1px}
.side nav{display:flex;flex-direction:column;gap:2px}
.side nav button{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:10px;font-size:14.5px;font-weight:600;color:var(--cream-2);text-align:left;min-height:42px}
.side nav button:hover{background:rgba(255,255,255,.06);color:var(--cream)}
.side nav button[aria-current]{background:rgba(255,255,255,.1);color:var(--cream)}
.side nav button[aria-current] .ic{stroke:var(--gold)}
.ic{width:18px;height:18px;flex:none;stroke:var(--mute);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.main{padding:20px 16px 90px;min-width:0}
@media(min-width:960px){ .main{padding:24px 26px 60px} }

/* command bar — the top-tier chrome */
.cmd{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.cmd .cs{position:relative;flex:1;max-width:440px}
.cmd .cs svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--mute);fill:none;stroke-width:2;pointer-events:none}
.cmd input{width:100%;min-height:42px;padding:0 12px 0 36px;border-radius:11px;border:1.5px solid var(--line-2);background:rgba(255,255,255,.05);font:inherit;font-size:14.5px;color:var(--cream)}
.cmd input::placeholder{color:var(--mute)}
.cmd input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,.08)}
.cmd .sp{flex:1}
.bell{position:relative;width:42px;height:42px;border-radius:11px;border:1.5px solid var(--line-2);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center}
.bell svg{width:18px;height:18px;stroke:var(--cream-2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bell i{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;border-radius:9px;background:var(--warn);color:#231a06;font-style:normal;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px}
.avatar{width:42px;height:42px;border-radius:11px;background:linear-gradient(180deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:14px;color:#fff}
.qa{display:flex;gap:8px;flex-wrap:wrap;margin:-6px 0 20px}
.qab{display:inline-flex;align-items:center;gap:7px;min-height:38px;padding:0 14px;border-radius:20px;border:1.5px solid var(--line-2);background:rgba(255,255,255,.05);font-size:13.5px;font-weight:700;color:var(--cream-2)}
.qab:hover{border-color:var(--gold);color:var(--cream)}
.qab svg{width:15px;height:15px;stroke:var(--gold);fill:none;stroke-width:2.2;stroke-linecap:round}
.kpi{position:relative;overflow:hidden}
.kpi .spark{position:absolute;right:10px;bottom:8px;width:74px;height:26px;opacity:.85}
.kpi .spark polyline{fill:none;stroke:var(--gold);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.kpi.good .spark polyline{stroke:var(--good)}
.card{box-shadow:0 14px 34px rgba(0,0,0,.18)}
.card:hover{border-color:var(--line-2)}
.h{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.h h1{margin:0;font-size:clamp(21px,4.6vw,28px);font-weight:800;letter-spacing:-.025em}
.h .sub{margin:4px 0 0;color:var(--mute);font-size:14px}
.h .sp{flex:1}

/* KPI row */
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:20px}
@media(min-width:820px){ .kpis{grid-template-columns:repeat(4,1fr)} }
.kpi{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;padding:14px 15px}
.kpi .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--mute)}
.kpi .v{font-size:clamp(21px,4.4vw,27px);font-weight:900;letter-spacing:-.025em;margin-top:5px;line-height:1}
.kpi .s{font-size:12.5px;color:var(--cream-2);margin-top:5px}
.kpi.good .v{color:var(--good)} .kpi.warn .v{color:var(--warn)}

.cols{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:900px){ .cols{grid-template-columns:1.35fr 1fr} }
.card{background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:16px;padding:16px 17px;margin-bottom:16px}
.card h3{margin:0 0 3px;font-size:15.5px;font-weight:800}
.card .cs{margin:0 0 14px;font-size:13px;color:var(--mute);line-height:1.5}

/* chart — hand-drawn SVG, no library, no CDN */
.chart{width:100%;height:170px;display:block;overflow:visible}
.chart .grid{stroke:rgba(255,255,255,.09);stroke-width:1}
.chart .bar{fill:var(--acc);rx:4}
.chart .bar.hi{fill:var(--gold)}
.chart .lbl{fill:var(--mute);font-family:var(--mono);font-size:10px}
.chart .val{fill:var(--cream-2);font-family:var(--mono);font-size:10px;font-weight:600}

/* funnel */
.fn{display:flex;flex-direction:column;gap:7px}
.fnr{display:flex;align-items:center;gap:11px}
.fnr .fl{font-size:13px;color:var(--cream-2);width:104px;flex:none}
.fnr .fb{flex:1;height:26px;border-radius:6px;background:rgba(255,255,255,.07);overflow:hidden}
.fnr .fb i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--gold));border-radius:6px}
.fnr .fv{font-family:var(--mono);font-size:13px;font-weight:700;width:30px;text-align:right}

/* lists / tables */
.rows{display:flex;flex-direction:column}
.r{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.r:last-child{border-bottom:none}
.r .m{min-width:0;flex:1}
.r .t{font-size:14.5px;font-weight:700;line-height:1.25}
.r .d{font-size:12.5px;color:var(--mute);margin-top:2px}
.r .rt{font-family:var(--mono);font-size:12.5px;color:var(--cream-2);white-space:nowrap;text-align:right}
.tag{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.1);color:var(--cream-2);white-space:nowrap}
.tag.good{background:rgba(111,201,138,.17);color:var(--good)}
.tag.warn{background:rgba(224,168,58,.17);color:var(--warn)}
.dot{width:9px;height:9px;border-radius:50%;flex:none;background:var(--mute)}
.dot.good{background:var(--good)} .dot.warn{background:var(--warn)}

table{width:100%;border-collapse:collapse}
th{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);text-align:left;padding:8px 10px 8px 0;border-bottom:1px solid var(--line);font-weight:600}
td{padding:11px 10px 11px 0;border-bottom:1px solid var(--line);font-size:14px}
tr:last-child td{border-bottom:none}
td.n{font-family:var(--mono);white-space:nowrap}
@media(max-width:640px){ .hide-s{display:none} }

/* the stack comparison */
.vs{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:860px){ .vs{grid-template-columns:1fr 1fr} }
.vs .col{border:1px solid var(--line);border-radius:16px;overflow:hidden}
.vs .ch{padding:13px 16px;border-bottom:1px solid var(--line);font-weight:800;font-size:15px}
.vs .theirs .ch{background:rgba(217,105,79,.13);color:#f0b6a6}
.vs .ours .ch{background:rgba(111,201,138,.13);color:var(--good)}
.vs .cb{padding:6px 16px 14px}
.stk{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.stk:last-child{border-bottom:none}
.stk .sj{color:var(--mute);font-size:12px;margin-top:2px}
.stk .sc{font-family:var(--mono);white-space:nowrap;color:var(--cream-2)}
.pain{margin-top:16px}
.pain .p{border-left:3px solid var(--bad);padding:2px 0 2px 14px;margin-bottom:14px}
.pain .p .pt{font-weight:800;font-size:14.5px;margin-bottom:3px}
.pain .p .pd{font-size:13.5px;color:var(--cream-2);line-height:1.6}
.mathbox{background:rgba(224,168,58,.1);border:1px solid rgba(224,168,58,.32);border-radius:14px;padding:15px 16px;margin-top:16px}
.mathbox .big{font-size:clamp(22px,5vw,30px);font-weight:900;letter-spacing:-.02em;color:var(--gold)}
.mathbox p{margin:7px 0 0;font-size:13.5px;line-height:1.6;color:#f0dcb0}
.src{font-size:11.5px;color:var(--mute);margin-top:9px;font-style:normal}

.cta{background:linear-gradient(168deg,var(--forest-l),var(--forest) 60%,var(--forest-d));border:1px solid var(--line-2);border-radius:18px;padding:22px;margin-top:20px}
.cta h3{margin:0 0 6px;font-size:19px;font-weight:800}
.cta p{margin:0 0 14px;font-size:14.5px;line-height:1.6;color:var(--cream-2);max-width:56ch}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:var(--tap);padding:0 18px;border-radius:12px;font-weight:700;font-size:15px;text-decoration:none}
.btn-p{background:linear-gradient(180deg,var(--acc),var(--acc2));color:#fff}
.btn-g{background:rgba(255,255,255,.08);border:1.5px solid var(--line-2);color:var(--cream)}
.btnrow{display:flex;gap:9px;flex-wrap:wrap}

/* mobile section switcher */
.mbar{position:fixed;left:0;right:0;bottom:0;z-index:70;background:rgba(12,29,16,.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;padding-bottom:var(--safe-b);overflow-x:auto}
@media(min-width:960px){ .mbar{display:none} }
.mbar button{flex:1;min-width:76px;min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10.5px;font-weight:700;color:var(--mute)}
.mbar button[aria-current]{color:var(--gold)}
.mbar .ic{width:20px;height:20px;stroke:currentColor}
</style>
</head>
<body>

<div class="demo" id="demoBar">
  Showroom — a working demo you cannot break. Nothing here saves, and no data is real.
  <a href="/shop.html#business">Back to the shop</a>
</div>

<div class="back">
  <div class="in">
    <a href="/shop.html#business"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>All business hubs</a>
    <span class="sp"></span>
    <a class="buy" id="ctaTop" href="/shop.html#business">See pricing</a>
  </div>
</div>

<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="mk" id="brandMk"></div>
      <div><div class="bn" id="brandName"></div><div class="bs" id="brandSub"></div></div>
    </div>
    <nav id="sideNav" aria-label="Sections"></nav>
  </aside>

  <main class="main" id="main"></main>
</div>

<nav class="mbar" id="mbar" aria-label="Sections"></nav>

<script src="/showroom-config.js"></script><script src="/showroom-org.js"></script>
<script>
(function(){
  var qs = new URLSearchParams(location.search);
  var T = window.AEShowroom.get(qs.get('trade') || 'realestate');
  var section = (location.hash||'').replace('#','') || 'dash';

  document.documentElement.style.setProperty('--acc', T.acc);
  document.documentElement.style.setProperty('--acc2', T.acc2);
  document.title = T.hub + ' — Showroom — Accelerated Experiences, LLC';

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function el(id){ return document.getElementById(id); }

  el('brandMk').style.background = T.acc;
  el('brandMk').textContent = T.firm.split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
  el('brandName').textContent = T.firm;
  el('brandSub').textContent  = T.firmSub;
  el('ctaTop').href = '/shop.html#' + T.priceId;

  /* ---- nav (desktop rail + mobile bar), built from config ---- */
  function icon(d){ return '<svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="'+d+'"/></svg>'; }
  function buildNav(){
    el('sideNav').innerHTML = T.sections.map(function(s){
      return '<button data-s="'+s.id+'"'+(s.id===section?' aria-current="page"':'')+'>'+icon(s.icon)+esc(s.label)+'</button>';
    }).join('');
    el('mbar').innerHTML = T.sections.map(function(s){
      return '<button data-s="'+s.id+'"'+(s.id===section?' aria-current="page"':'')+'>'+icon(s.icon)+esc(s.label)+'</button>';
    }).join('');
    [].forEach.call(document.querySelectorAll('[data-s]'), function(b){
      b.addEventListener('click', function(){ go(b.dataset.s); });
    });
  }
  function go(id){
    section = id;
    [].forEach.call(document.querySelectorAll('[data-s]'), function(b){
      if(b.dataset.s===id) b.setAttribute('aria-current','page'); else b.removeAttribute('aria-current');
    });
    render();
    if(history.replaceState) history.replaceState(null,'','#'+id);
    window.scrollTo({top:0,behavior:'smooth'});
  }

  /* ---- the chart, drawn by hand so there is no library to fail ---- */
  function chart(c){
    var w=560,h=170,pad=26,max=Math.max.apply(null,c.vals)*1.15;
    var bw=(w-pad*2)/c.vals.length*0.62, gap=(w-pad*2)/c.vals.length;
    var bars=c.vals.map(function(v,i){
      var bh=(v/max)*(h-46), x=pad+i*gap+(gap-bw)/2, y=h-26-bh;
      var hi = i===c.vals.length-1 ? ' hi' : '';
      return '<rect class="bar'+hi+'" x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="4"/>'
           + '<text class="val" x="'+(x+bw/2).toFixed(1)+'" y="'+(y-6).toFixed(1)+'" text-anchor="middle">'+v+'</text>'
           + '<text class="lbl" x="'+(x+bw/2).toFixed(1)+'" y="'+(h-9)+'" text-anchor="middle">'+c.months[i]+'</text>';
    }).join('');
    var lines=[0.25,0.5,0.75,1].map(function(f){
      var y=(h-26)-(f*(h-46));
      return '<line class="grid" x1="'+pad+'" x2="'+(w-pad)+'" y1="'+y.toFixed(1)+'" y2="'+y.toFixed(1)+'"/>';
    }).join('');
    return '<svg class="chart" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" role="img" aria-label="'+esc(c.title)+'">'+lines+bars+'</svg>';
  }

  function funnel(f){
    var max=Math.max.apply(null,f.map(function(x){return x.n;}));
    return '<div class="fn">'+f.map(function(x){
      return '<div class="fnr"><span class="fl">'+esc(x.s)+'</span>'
        + '<span class="fb"><i style="width:'+Math.round(x.n/max*100)+'%"></i></span>'
        + '<span class="fv">'+x.n+'</span></div>';
    }).join('')+'</div>';
  }

  /* ---- sections ---- */
  /* deterministic sparkline per KPI — same shape every visit, seeded off the label */
  function spark(seedStr, tone){
    var seed=0; for(var i=0;i<seedStr.length;i++) seed=(seed*31+seedStr.charCodeAt(i))>>>0;
    var pts=[]; var v=12;
    for(var x=0;x<=9;x++){ seed=(seed*1103515245+12345)>>>0; v=Math.max(3,Math.min(23,v+((seed>>16)%9)-(tone==='warn'?5:3))); pts.push((x*8)+','+(26-v)); }
    return '<svg class="spark" viewBox="0 0 74 26" preserveAspectRatio="none" aria-hidden="true"><polyline points="'+pts.join(' ')+'"/></svg>';
  }

  function dash(){
    var warns = T.today.filter(function(x){return x.tone==='warn';}).length;
    var hour = new Date().getHours();
    var greet = hour<12 ? 'Good morning' : hour<17 ? 'Good afternoon' : 'Good evening';
    var initials = T.firm.split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
    return '<div class="cmd">'
      + '<div class="cs"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.6-3.6"/></svg>'
      + '<input id="cmdQ" type="search" placeholder="Search '+esc(T.firm)+'…" aria-label="Search"></div>'
      + '<span class="sp"></span>'
      + '<button class="bell" aria-label="'+warns+' items need attention" data-s="dash"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>'+(warns?'<i>'+warns+'</i>':'')+'</button>'
      + '<div class="avatar">'+esc(initials)+'</div></div>'
      + '<div class="h"><div><h1>'+greet+'</h1><p class="sub">Here is '+esc(T.firm)+' today.</p></div></div>'
      + '<div class="qa">'
      + T.sections.filter(function(s){return s.id!=='dash';}).slice(0,4).map(function(s){
          return '<button class="qab" data-s="'+s.id+'"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>'+esc(s.label)+'</button>';
        }).join('')
      + '</div>'
      + '<div class="kpis">' + T.kpis.map(function(k){
          return '<div class="kpi '+(k.tone||'')+'"><div class="k">'+esc(k.k)+'</div><div class="v">'+esc(k.v)+'</div><div class="s">'+esc(k.s)+'</div>'+spark(k.k+T.id,k.tone)+'</div>';
        }).join('') + '</div>'
      + '<div class="cols"><div>'
        + '<div class="card"><h3>'+esc(T.chart.title)+'</h3><p class="cs">Last six months, in '+esc(T.chart.unit)+'.</p>'+chart(T.chart)+'</div>'
        + '<div class="card"><h3>'+esc(T.funnelTitle||'Where everything stands')+'</h3><p class="cs">'+esc(T.funnelSub||'Everything in one place, at a glance.')+'</p>'+funnel(T.funnel)+'</div>'
      + '</div><div>'
        + '<div class="card"><h3>Needs you today</h3><p class="cs">Pulled from the deals themselves, not a separate task list.</p><div class="rows">'
        + T.today.map(function(x){
            return '<div class="r"><span class="dot '+(x.tone||'')+'"></span><div class="m"><div class="t">'+esc(x.t)+'</div><div class="d">'+esc(x.w)+'</div></div><div class="rt">'+esc(x.when)+'</div></div>';
          }).join('')
        + '</div></div></div></div>';
  }

  function deals(){
    var meta = T.dealsMeta || { h1:'Deals', sub:'Every file, every stage, one list.', cols:['Property','Price','Stage','Agent','Next'] };
    return '<div class="h"><div><h1>'+esc(meta.h1)+'</h1><p class="sub">'+esc(meta.sub)+'</p></div></div>'
      + '<div class="card"><table><thead><tr><th>'+esc(meta.cols[0])+'</th><th>'+esc(meta.cols[1])+'</th><th>'+esc(meta.cols[2])+'</th><th class="hide-s">'+esc(meta.cols[3])+'</th><th class="hide-s">'+esc(meta.cols[4])+'</th></tr></thead><tbody>'
      + T.deals.map(function(d){
          return '<tr><td><b>'+esc(d.a)+'</b></td><td class="n">'+esc(d.p)+'</td>'
            + '<td><span class="tag '+(d.tone||'')+'">'+esc(d.st)+'</span></td>'
            + '<td class="hide-s">'+esc(d.ag)+'</td><td class="hide-s n">'+esc(d.d)+'</td></tr>';
        }).join('')
      + '</tbody></table></div>';
  }

  function people(){
    var lbl=(T.sections.find(function(s){return s.id==='people';})||{}).label||'People';
    var sub=T.peopleSub||'Their work and their paperwork on the same card.';
    return '<div class="h"><div><h1>'+esc(lbl)+'</h1><p class="sub">'+esc(sub)+'</p></div></div>'
      + '<div class="card"><div class="rows">'
      + T.people.map(function(p){
          return '<div class="r"><div class="m"><div class="t">'+esc(p.n)+'</div><div class="d">'+esc(p.r)+' · '+esc(p.d)+'</div></div>'
            + (p.flag? '<span class="tag warn">'+esc(p.flag)+'</span>' : '<span class="tag good">All current</span>')+'</div>';
        }).join('')
      + '</div></div>';
  }

  function money(){
    var M = T.money || { h1:'Money', sub:'Calculated from the work, not re-keyed into accounting.', kpis:[], listTitle:'This cycle', listSub:'Each line traces back to where it came from.', rows:[] };
    return '<div class="h"><div><h1>'+esc(M.h1)+'</h1><p class="sub">'+esc(M.sub)+'</p></div></div>'
      + '<div class="kpis">'+M.kpis.map(function(k){
          return '<div class="kpi '+(k.tone||'')+'"><div class="k">'+esc(k.k)+'</div><div class="v">'+esc(k.v)+'</div><div class="s">'+esc(k.s)+'</div></div>';
        }).join('')+'</div>'
      + '<div class="card"><h3>'+esc(M.listTitle)+'</h3><p class="cs">'+esc(M.listSub)+'</p><div class="rows">'
      + M.rows.map(function(p){
          return '<div class="r"><div class="m"><div class="t">'+esc(p.n)+'</div><div class="d">'+esc(p.d)+'</div></div><div class="rt">'+esc(p.v)+'</div></div>';
        }).join('')
      + '</div></div>';
  }

  function stack(){
    var theirTotal = '';
    return '<div class="h"><div><h1>What this replaces</h1><p class="sub">What '+esc(T.who)+' is most likely paying for right now, and where it comes apart.</p></div></div>'
      + '<div class="vs">'
        + '<div class="col theirs"><div class="ch">The usual stack</div><div class="cb">'
          + T.stack.map(function(s){
              return '<div class="stk"><div><b>'+esc(s.tool)+'</b><div class="sj">'+esc(s.job)+(s.note?' · '+esc(s.note):'')+'</div></div><div class="sc">'+esc(s.cost)+'</div></div>';
            }).join('')
          + '</div></div>'
        + '<div class="col ours"><div class="ch">'+esc(T.hub)+'</div><div class="cb">'
          + '<div class="stk"><div><b>All of it</b><div class="sj">Leads, deals, signatures, commissions, people, marketing — one system, one login</div></div><div class="sc" id="ourPrice">—</div></div>'
          + '<div class="stk"><div><b>No per-seat fee</b><div class="sj">Hiring does not change the price</div></div><div class="sc">included</div></div>'
          + '<div class="stk"><div><b>Your brand, your domain</b><div class="sj">Built around how you work, not a template</div></div><div class="sc">setup</div></div>'
          + '<div class="stk"><div><b>Support from the builders</b><div class="sj">Not a ticket queue</div></div><div class="sc">included</div></div>'
        + '</div></div>'
      + '</div>'
      + '<p class="src">'+esc(T.stackNote)+'</p>'
      + '<div class="pain">' + T.pain.map(function(p){
          return '<div class="p"><div class="pt">'+esc(p.t)+'</div><div class="pd">'+esc(p.d)+'</div></div>';
        }).join('') + '</div>'
      + '<div class="mathbox"><div class="big">'+ (T.painMath
            ? (function(){ var m=T.painMath; return Math.round(m.deals*m.minutes/60).toLocaleString('en-US')+' hours a year'; })()
            : esc(T.painHeadline||'')) +'</div>'
        + '<p>'+esc(T.painStat)+(T.painMath ? ' At '+T.painMath.deals+' '+esc(T.painMath.label)+', that is a full-time job doing nothing but moving the same information between systems that will not talk to each other.' : '')+'</p>'
        + '<div class="src">Source: '+esc(T.painStatSrc)+'. Your numbers will differ — we will work them out with you rather than guess.</div></div>'
      + '<div class="cta"><h3>This is the real thing</h3>'
        + '<p>Everything you just clicked is the actual interface, running in your browser. Nothing saves, because this floor model is not wired to a database — yours would be.</p>'
        + '<div class="btnrow"><a class="btn btn-p" href="/shop.html#'+esc(T.priceId)+'">See pricing</a>'
        + '<a class="btn btn-g" href="mailto:anthonye@aexperiences.studio?subject=' + encodeURIComponent(T.hub + ' — questions') + '">Ask us anything</a></div></div>';
  }

  function suite(){
    var items = window.AEShowroom.suiteFor(T);
    return '<div class="h"><div><h1>Everything inside</h1><p class="sub">Every tool '+esc(T.who)+' runs today — one system, one login, nothing missing.</p></div></div>'
      + '<div class="kpis" style="grid-template-columns:repeat(2,1fr)">'
      + '<div class="kpi good"><div class="k">Tools in this hub</div><div class="v">'+items.length+'</div><div class="s">no add-ons, no per-seat fees</div></div>'
      + '<div class="kpi"><div class="k">Separate vendors needed</div><div class="v">0</div><div class="s">this is the whole stack</div></div></div>'
      + '<div class="card"><div class="rows">'
      + items.map(function(x){
          return '<div class="r"><span class="dot good"></span><div class="m"><div class="t">'+esc(x[0])+'</div><div class="d">'+esc(x[1])+'</div></div><span class="tag good">Included</span></div>';
        }).join('')
      + '</div></div>'
      + '<div class="cta"><h3>Nothing here is an integration</h3>'
      + '<p>Every line above is the same system reading the same records — which is why the dashboard can know everything at once. Integrations copy data between vendors; this has nothing to copy.</p>'
      + '<div class="btnrow"><a class="btn btn-p" href="/shop.html#'+esc(T.priceId)+'">See pricing</a>'
      + '<a class="btn btn-g" href="mailto:anthonye@aexperiences.studio?subject='+encodeURIComponent(T.hub+' — questions')+'">Ask us anything</a></div></div>';
  }

  var VIEWS = { dash:dash, deals:deals, people:people, money:money, stack:stack, suite:suite, org:function(){ return (window.AEOrg&&window.AEOrg.render)?window.AEOrg.render(T):dash(); } };
  function render(){
    // only sections this trade actually declares — a hash for a tab that doesn't exist here falls back to the dashboard
    if (!T.sections.some(function(s){ return s.id===section; })) section='dash';
    var fn = VIEWS[section] || dash;
    el('main').innerHTML = fn();
    // wire the dashboard's quick actions + the live search (filters deals as you type)
    [].forEach.call(el('main').querySelectorAll('[data-s]'), function(b){
      if(b.id!=='cmdQ') b.addEventListener('click', function(){ go(b.dataset.s); });
    });
    var q=document.getElementById('cmdQ');
    if(q){ q.addEventListener('keydown', function(e){
      if(e.key==='Enter'){ go('deals'); }
    }); }
    // pull the live price into the comparison, so this page can never quote a stale number
    var slot = el('ourPrice');
    if (slot) {
      fetch('https://aexperiences.studio/api/pricing')
        .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
        .then(function(rec){
          var h=(rec.hubs||[]).find(function(x){return x.id===T.priceId;});
          if(h && h.tiers && h.tiers[0]) slot.textContent = '$'+Number(h.tiers[0].mo).toLocaleString('en-US')+'/mo';
        })
        .catch(function(){ slot.textContent = 'see pricing'; });
    }
  }

  buildNav();
  render();
})();
</script>
</body>
</html>
